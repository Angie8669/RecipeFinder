<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Recipe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename = 'styles/recipeForm.css')}}">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="{{ url_for('static', filename = 'scripts/recipeForm.js')}}"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
</head>
<body>
    <div class="recipeForm">
        <div class="row">
            <label for="imageURL">Image URL</label>
            <input id="imageURL" type="text" placeholder="Insert URL for image." name="imageURL"/>
            <img src="" id="imagePreview"/>
        </div>
        <div class="row">
            <div class="column">
                <div id="ingredientList"></div>
                <div>
                    <button id="addIngredient">Add Ingredient</button>
                </div>
            </div>
            <div class="column">
                <div id="equipmentList"></div>
                <div>
                    <button id="addEquipment">Add Equipment</button>
                </div>
            </div>
        </div>
        <div class="row">
            <textarea id="instructions"></textarea>
            <button id="submit">Create Recipe</button>
        </div>
    </div>


</body>
</html>
